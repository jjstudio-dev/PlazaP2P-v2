name: "🤝 Comunidad Colaboradora"
description: "Registrar un grupo, canal o comunidad alineada con el ecosistema"
title: "[COMUNIDAD] Nombre de la comunidad"
labels: ["comunidad", "pendiente-revision"]
body:

  - type: markdown
    attributes:
      value: |
        # Añadir una Comunidad Colaboradora a PlazaP2P
        Grupos, canales, foros y comunidades afines que quieran aparecer en el directorio.
        Enfoque principal: comunidades de España o en español.

  - type: input
    id: nombre
    attributes:
      label: "Nombre de la comunidad *"
      placeholder: "Bitcoin Madrid / Cripto Anarchy Club / Noders Hispano"
    validations:
      required: true

  - type: dropdown
    id: plataforma
    attributes:
      label: "Plataforma principal *"
      options:
        - "Telegram"
        - "Discord"
        - "Nostr"
        - "Matrix / Element"
        - "Foro propio"
        - "Meetup.com"
        - "Reddit"
        - "Signal"
        - "Otra"
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: "Link de acceso *"
      placeholder: "https://t.me/... / https://discord.gg/..."
    validations:
      required: true

  - type: dropdown
    id: pais
    attributes:
      label: "Alcance geográfico *"
      options:
        - "España — Nacional"
        - "Madrid"
        - "Barcelona"
        - "Valencia"
        - "Sevilla"
        - "Málaga"
        - "Alicante"
        - "Bilbao / País Vasco"
        - "Zaragoza"
        - "Canarias"
        - "Galicia"
        - "Asturias"
        - "Castilla y León"
        - "Castilla-La Mancha"
        - "Extremadura"
        - "Baleares"
        - "Otra ciudad española"
        - "Online (español)"
    validations:
      required: true

  - type: input
    id: ciudad
    attributes:
      label: "Ciudad (si es local)"
      placeholder: "Madrid / Barcelona / Buenos Aires"

  - type: input
    id: miembros
    attributes:
      label: "Número aproximado de miembros"
      placeholder: "~500 / más de 2000 / pequeña y activa"

  - type: textarea
    id: descripcion
    attributes:
      label: "Descripción y enfoque *"
      description: "De qué trata la comunidad, qué tipo de personas la forman, qué se debate..."
      placeholder: |
        Grupo de Telegram de bitcoiners en Madrid. Organizamos meetups mensuales,
        compartimos noticias y debatimos sobre Bitcoin, Lightning Network y
        soberanía financiera. Ambiente técnico y filosófico, sin spam.
    validations:
      required: true

  - type: input
    id: idioma
    attributes:
      label: "Idioma principal"
      placeholder: "Español / English / Bilingüe"

  - type: input
    id: contacto
    attributes:
      label: "Contacto del responsable o admin"
      placeholder: "@telegram / email"

  - type: checkboxes
    id: confirmacion
    attributes:
      label: "Confirmación *"
      options:
        - label: "Soy miembro o responsable de esta comunidad y tengo autorización para publicarla"
          required: true
        - label: "La comunidad está activa y es relevante para la economía circular Bitcoin"
          required: true
